name: Build & Release EXE

# Builds the Windows .exe on a real Windows runner and publishes it.
#  - On a pushed tag like v1.0.0 → creates a GitHub Release with the exe attached.
#  - Manual run (workflow_dispatch) → uploads the exe as a build artifact.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows exe
        run: npm run build:exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dota2Tracker-windows
          path: dist/Dota2Tracker.exe

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Dota2Tracker.exe
          generate_release_notes: true
